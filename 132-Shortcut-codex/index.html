<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shortcut</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ec;
      --ink: #17191c;
      --muted: #646b73;
      --line: #d8d0c5;
      --panel: #fffdfa;
      --panel-2: #faf6ef;
      --p1: #b9492c;
      --p2: #0f6b67;
      --shadow: 0 16px 38px rgba(35, 31, 25, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button {
      font: inherit;
    }

    button {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      touch-action: manipulation;
      background: #ebe3d8;
      color: var(--ink);
      font-weight: 900;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button:hover:not(:disabled),
    button:focus-visible {
      outline: 3px solid rgba(15, 107, 103, 0.18);
      border-color: var(--p1);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    button.ready {
      background: #d8efe3;
      color: #126c3d;
      border-color: #89c8a8;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.58);
      white-space: nowrap;
    }

    main {
      display: grid;
      gap: 20px;
      padding-top: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: clamp(16px, 3vw, 28px);
    }

    .challenge {
      display: grid;
      gap: 10px;
      align-items: center;
      justify-items: center;
    }

    .numberBox {
      min-height: 116px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 14px;
      background: var(--panel-2);
    }

    .numberBox strong {
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: clamp(2.7rem, 9vw, 6rem);
      line-height: 0.9;
    }

    .targetLabel {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .players {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .player {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      background: var(--panel);
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .player[data-player="0"] {
      box-shadow: inset 5px 0 0 var(--p1);
    }

    .player[data-player="1"] {
      box-shadow: inset 5px 0 0 var(--p2);
    }

    .player.solved,
    .player.gaveup {
      background: #f1eee8;
    }

    .player.solved .current {
      border-color: #89c8a8;
      background: #edf8f2;
    }

    .player.gaveup .current {
      border-color: #d8aaa0;
      background: #f8e8e2;
      color: #7c240f;
    }

    h2,
    h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.35rem, 3vw, 2rem);
    }

    .current {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 94px;
      display: grid;
      place-items: center;
      background: var(--panel-2);
      padding: 10px;
    }

    .current strong {
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: clamp(2.4rem, 8vw, 4.8rem);
      line-height: 0.95;
    }

    .commands {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .keyMap {
      grid-column: 1;
      grid-row: 1;
      display: grid;
      grid-template-columns: repeat(3, 24px);
      gap: 4px;
      align-content: center;
      justify-content: center;
      min-height: 48px;
    }

    .keyMap span {
      min-height: 22px;
      border: 1px solid var(--line);
      border-radius: 5px;
      display: grid;
      place-items: center;
      background: #f6f1e9;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 950;
      line-height: 1;
    }

    .keyMap .top {
      grid-column: 2;
      grid-row: 1;
    }

    .keyMap span:not(.top) {
      grid-row: 2;
    }

    .commands [data-command="undo"] {
      grid-column: 2;
      grid-row: 1;
    }

    .remainingCounter {
      grid-column: 3;
      grid-row: 1;
      min-height: 48px;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 1.8rem;
      font-weight: 950;
      line-height: 1;
    }

    .commands [data-command="half"] {
      grid-column: 1;
      grid-row: 2;
    }

    .commands [data-command="add2"] {
      grid-column: 2;
      grid-row: 2;
    }

    .commands [data-command="double"] {
      grid-column: 3;
      grid-row: 2;
    }

    .player.solved .commands button,
    .player.gaveup .commands button {
      opacity: 0.36;
    }

    .primary {
      background: var(--p1);
      color: #fff;
    }

    .danger {
      background: #f3d6cc;
      color: #7c240f;
    }

    .result {
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .resultGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px 12px;
    }

    .resultCell {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      min-height: 42px;
      padding: 6px 10px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .resultScore {
      color: var(--muted);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .resultScore.winner {
      color: #126c3d;
    }

    .resultScore.loser {
      color: #a53219;
    }

    .resultValue {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 950;
      line-height: 1.05;
    }

    .resultEmpty {
      color: transparent;
    }

    .nextControls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .hidden {
      display: none;
    }

    .sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      header {
        align-items: start;
        flex-direction: column;
      }

      .topline {
        justify-content: flex-start;
      }

      .players {
        grid-template-columns: 1fr;
      }

      .nextControls {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding: 12px 0;
      }

    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Shortcut</h1>
      <div class="topline" aria-live="polite">
        <span class="pill">Level <span id="level">1</span></span>
        <span class="pill">Max <span id="maxValue">20</span></span>
        <span class="pill">Round <span id="round">1</span></span>
      </div>
    </header>

    <main id="gamePage">
      <section class="panel" aria-label="Challenge">
        <div class="challenge">
          <p class="targetLabel">Target</p>
          <div class="numberBox">
            <strong id="targetValue">13</strong>
          </div>
        </div>
      </section>

      <section class="players" id="players" aria-label="Players"></section>
    </main>

    <main id="resultPage" class="hidden" aria-label="Results">
      <section class="panel result">
      <h2 id="resultTitle">Round complete</h2>
      <div class="resultGrid" id="resultGrid"></div>
      <div class="nextControls" id="nextControls">
        <button class="primary" type="button" data-next-player="0">Next [Tab]</button>
        <button class="primary" type="button" data-next-player="1">Next [Enter]</button>
      </div>
      </section>
    </main>
  </div>

  <div class="sr" id="live" aria-live="polite"></div>
  <script src="sketch.js"></script>
</body>
</html>
