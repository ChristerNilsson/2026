<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lotta-Skriv</title>
  </head>
  <body>
    <script>
      const groups = {
        18772: ["Stefan Engström", "Tom Braathen", "Stéphane Bruchfeld", "FM Rolf Bergström"],
        18773: ["Anna Andersson", "Bo Berg", "Cecilia Carlsson", "David Dahl"],
        18774: ["Eva Ek", "Filip Fors", "Greta Gran", "Hans Holm"],
        18775: ["Ida Isaksson", "Jan Jansson", "Karin Karlsson", "Lars Lind"],
        18776: ["Maria Mark", "Nils Nord", "Olivia Olofsson", "Per Persson", "Rita Roos", "Stig Strand"],
      };
      const originalFetch = window.fetch;
      window.fetch = async (url, options) => {
        const id = new URL(url, location.href).searchParams.get("id");
        const players = groups[id];
        if (!players) return originalFetch(url, options);
        const rows = players
          .map((name, index) => `<tr><td onclick="postshowindtournamentresultform('${id}','${id}${index}')"></td><td></td><td></td><td>${name}</td><td></td><td></td><td></td><td>${2000 - index * 20}</td></tr>`)
          .join("");
        const group = `S_${Number(id) - 18771}`;
        return new Response(`<title>SRS ${group} SRS</title><table class="js-sort-table"><tr><td></td><td></td><td></td><td>NAMN</td><td></td><td>KLUBB</td><td></td><td>RANKING 1/6</td></tr>${rows}</table>`);
      };
    </script>
    <script src="./sketch.js"></script>
  </body>
</html>
