<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gruppindelning</title>
  <style>
    body { max-width: 800px; margin: 2rem auto; padding: 0 1rem; font-family: system-ui, sans-serif; }
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
    .controls { display: flex; align-items: center; gap: .75rem; }
    button { min-width: 2.5rem; padding: .4rem; font-size: 1.2rem; }
    section { margin-top: 2rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: .45rem .6rem; border-bottom: 1px solid #ddd; text-align: left; }
    .ranking { text-align: right; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">Gruppindelning</h1>
      <div id="status"></div>
    </div>
    <div class="controls">
      <button id="decrease" type="button">-</button>
      <strong>n = <span id="n"></span></strong>
      <button id="increase" type="button">+</button>
    </div>
  </header>
  <main id="output"></main>
  <script src="sketch.js"></script>
</body>
</html>
