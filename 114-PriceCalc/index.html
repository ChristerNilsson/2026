<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priskalkylator</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f4f1ec;
        --panel: #ffffff;
        --ink: #222222;
        --muted: #66625c;
        --line: #ddd5ca;
        --field: #fbfaf7;
        --gold: #a87317;
        --silver: #66727d;
        --bronze: #936144;
        --accent: #236c70;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--page);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 480px);
        display: grid;
        gap: 22px;
        padding: 28px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(52, 45, 36, 0.14);
      }

      header {
        display: grid;
        gap: 6px;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
        line-height: 1.15;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      .controls,
      .results {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--field);
        color: inherit;
        font: inherit;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(35, 108, 112, 0.18);
      }

      .result {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        min-height: 50px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--field);
      }

      .result strong {
        min-width: 0;
      }

      output {
        color: var(--accent);
        font-weight: 800;
        white-space: nowrap;
      }

      .gold output {
        color: var(--gold);
      }

      .silver output {
        color: var(--silver);
      }

      .bronze output {
        color: var(--bronze);
      }

      .total {
        background: #eef7f6;
        border-color: rgba(35, 108, 112, 0.25);
      }

      @media (max-width: 420px) {
        body {
          padding: 14px;
        }

        main {
          padding: 20px;
        }

        .result {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Priskalkylator</h1>
        <p>Fördela beloppet mellan guld, silver och brons.</p>
      </header>

      <section class="controls" aria-label="Indata">
        <label for="amount">
          Belopp
          <input id="amount" type="number" value="2000" min="0" step="50" />
        </label>

        <label for="step">
          Steg
          <input id="step" type="number" value="100" min="0" step="50" />
        </label>
      </section>

      <section class="results" aria-label="Priser">
        <div class="result gold">
          <strong>Guld</strong>
          <output id="gold-price" for="amount step"></output>
        </div>

        <div class="result silver">
          <strong>Silver</strong>
          <output id="silver-price" for="amount step"></output>
        </div>

        <div class="result bronze">
          <strong>Brons</strong>
          <output id="bronze-price" for="amount step"></output>
        </div>

        <div class="result total">
          <strong>Total prissumma</strong>
          <output id="total-price" for="amount step"></output>
        </div>
      </section>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
