<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priskalkylator</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(100% - 32px, 360px);
        display: grid;
        gap: 12px;
      }

      label,
      p {
        display: grid;
        gap: 4px;
        margin: 0;
      }

      input,
      output {
        padding: 8px;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Priskalkylator</h1>

      <label>
        Belopp
        <input id="amount" type="number" value="2000" />
      </label>

      <label>
        Steg
        <input id="step" type="number" value="100" />
      </label>

      <p>
        Första pris
        <output id="first-price"></output>
      </p>

      <p>
        Andra pris
        <output id="second-price"></output>
      </p>

      <p>
        Tredje pris
        <output id="third-price"></output>
      </p>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
