<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Priskalkylator</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f6f4ef;
        color: #1f1f1f;
      }

      main {
        width: min(100% - 32px, 360px);
        display: grid;
        gap: 16px;
        padding: 24px;
        background: #fff;
        border: 1px solid #ded8cc;
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(31, 31, 31, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 1.75rem;
      }

      label,
      p {
        display: grid;
        gap: 4px;
        margin: 0;
      }

      input,
      output {
        padding: 10px;
        font: inherit;
        border: 1px solid #cfc7b8;
        border-radius: 6px;
      }

      output {
        background: #f8f7f3;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Priskalkylator</h1>

      <label>
        Belopp
        <input id="amount" type="number" value="2000" step="50" />
      </label>

      <label>
        Steg
        <input id="step" type="number" value="100" step="50" />
      </label>

      <p>
        Guld
        <output id="gold-price"></output>
      </p>

      <p>
        Silver
        <output id="silver-price"></output>
      </p>

      <p>
        Brons
        <output id="bronze-price"></output>
      </p>

      <p>
        Total prissumma
        <output id="total-price"></output>
      </p>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
