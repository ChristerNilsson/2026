<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TimeCalc</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f5f1;
        color: #202421;
      }

      main {
        width: min(960px, calc(100% - 32px));
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 24px;
      }

      section {
        padding: 22px;
        background: #fff;
        border: 1px solid #d8ddd6;
        border-radius: 8px;
      }

      h1,
      h2 {
        margin: 0 0 18px;
        font-size: 24px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 5px;
        font-size: 14px;
      }

      input {
        width: 100%;
        min-height: 40px;
        padding: 8px 10px;
        border: 1px solid #b9c1ba;
        border-radius: 6px;
        font: inherit;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        font: 700 24px/1.55 Consolas, "Courier New", monospace;
      }

      @media (max-width: 760px) {
        body {
          place-items: start center;
          padding: 16px 0;
        }

        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>TimeCalc</h1>
        <form>
          <label>
            Start time
            <input id="start" type="time" value="10:00" />
          </label>
          <label>
            Intro (min)
            <input id="intro" type="number" min="0" step="1" value="10" />
          </label>
          <label>
            Number of rounds
            <input id="rounds" type="number" min="1" step="1" value="7" />
          </label>
          <label>
            Number of rounds before lunch
            <input id="beforeLunch" type="number" min="0" step="1" value="4" />
          </label>
          <label>
            Chess clock (min)
            <input id="clock" type="number" min="0" step="1" value="15" />
          </label>
          <label>
            Pairing time (min)
            <input id="pairing" type="number" min="0" step="1" value="5" />
          </label>
          <label>
            Lunch break (min)
            <input id="lunch" type="number" min="0" step="1" value="30" />
          </label>
        </form>
      </section>

      <section>
        <h2>Schedule</h2>
        <pre id="result"></pre>
      </section>
    </main>

    <script src="./sketch.js"></script>
  </body>
</html>
