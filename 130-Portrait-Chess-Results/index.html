<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portrait Chess Results</title>
  <style>
    body {
      margin: 24px;
      color: #111;
      background: #fff;
      font: 14px/1.45 Arial, Helvetica, sans-serif;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 20px;
    }

    a,
    button {
      padding: 7px 10px;
      border: 1px solid #777;
      border-radius: 4px;
      color: #111;
      background: #fff;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin: 0 0 24px;
      border-collapse: collapse;
    }

    caption {
      padding: 8px 0;
      text-align: left;
      font-weight: 700;
    }

    th,
    td {
      padding: 4px 6px;
      border: 1px solid #ccc;
      text-align: left;
    }

    th {
      background: #eee;
    }
  </style>
</head>
<body>
  <main>
    <h1>Portrait Chess Results</h1>
    <div class="actions">
      <button type="button" id="run">Kör lokal demo</button>
      <a href="https://s2.chess-results.com/tnr1301930.aspx?lan=1&amp;art=0&amp;flag=30&amp;SNode=S0">Öppna exempelsida</a>
    </div>

    <table class="link-list">
      <caption>Länkar på startsidan</caption>
      <tbody>
        <tr>
          <td><a href="tnr1301930.aspx?lan=1&amp;art=1&amp;rd=9&amp;turdet=YES&amp;flag=30&amp;SNode=S0">Ställning rond 9</a></td>
          <td><a href="tnr1301930.aspx?lan=1&amp;art=2&amp;rd=9&amp;turdet=YES&amp;flag=30&amp;SNode=S0">Bordslista rond 9</a></td>
          <td><a href="#info">Info</a></td>
        </tr>
      </tbody>
    </table>

    <table class="tournamentbottom">
      <caption>Ignorerad footer</caption>
      <thead>
        <tr><th>Info</th><th>Värde</th></tr>
      </thead>
      <tbody>
        <tr><td>Footer</td><td>Ska inte visas</td></tr>
        <tr><td>Länkar</td><td>Ej intressant</td></tr>
      </tbody>
    </table>

    <table class="js-sort-table greyproptable standings-table">
      <caption>Ställning</caption>
      <thead>
        <tr><th>Pl</th><th>Namn</th><th>Klubb</th><th>Poäng</th><th>TB</th><th></th><th></th></tr>
      </thead>
      <tbody id="standings"></tbody>
    </table>

    <table class="js-sort-table greyproptable board-table">
      <caption>Bordslista</caption>
      <thead>
        <tr><th>Bord</th><th>Vit</th><th>Klubb</th><th>Resultat</th><th>Svart</th><th>Klubb</th><th></th><th></th></tr>
      </thead>
      <tbody id="boards"></tbody>
    </table>
  </main>

  <script>
    const names = ["Andersson", "Berg", "Carlsson", "Dahl", "Ek", "Fors", "Gran", "Holm", "Isaksson", "Jansson"];

    for (let i = 1; i <= 100; i += 1) {
      document.getElementById("standings").insertAdjacentHTML(
        "beforeend",
        `<tr><td>${i}</td><td>${names[(i + 3) % names.length]} ${i}</td><td>Klubb ${1 + (i % 12)}</td><td>${(9 - i / 20).toFixed(1)}</td><td>${200 - i}</td><td></td><td></td></tr>`
      );
      document.getElementById("boards").insertAdjacentHTML(
        "beforeend",
        `<tr><td>${i}</td><td>${names[i % names.length]} ${i}</td><td>Klubb ${1 + (i % 12)}</td><td>${i % 3 === 0 ? "1-0" : i % 3 === 1 ? "0-1" : "½-½"}</td><td>${names[(i + 5) % names.length]} ${i + 100}</td><td>Klubb ${1 + ((i + 5) % 12)}</td><td></td><td></td></tr>`
      );
    }

    document.getElementById("run").addEventListener("click", () => {
      const script = document.createElement("script");
      script.src = "sketch.js";
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
